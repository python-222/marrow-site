<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3730d4"/>
      <stop offset="50%"  stop-color="#5b52f0"/>
      <stop offset="100%" stop-color="#7c74f5"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="120" height="120" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="url(#bgGrad)"/>

  <!-- Top shine overlay -->
  <rect width="120" height="120" rx="28" fill="url(#shineGrad)"/>

  <!-- Subtle border -->
  <rect width="120" height="120" rx="28" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ── Book spines / shelf ── -->
  <!-- Heights follow M-silhouette: tall · med · short · med · tall -->
  <!-- giving the icon a hidden "M" letterform in the negative space -->

  <!-- Spine 1 – tallest left anchor -->
  <rect x="16" y="24" width="14" height="68" rx="3.5"
        fill="white" opacity="0.95"/>

  <!-- Spine 2 – medium -->
  <rect x="34" y="36" width="11" height="56" rx="2.5"
        fill="white" opacity="0.75"/>

  <!-- Spine 3 – shortest (valley of M) -->
  <rect x="49" y="48" width="9"  height="44" rx="2"
        fill="white" opacity="0.55"/>

  <!-- Spine 4 – medium (rise) -->
  <rect x="62" y="38" width="11" height="54" rx="2.5"
        fill="white" opacity="0.70"/>

  <!-- Spine 5 – tallest right anchor (mirror of 1) -->
  <rect x="77" y="26" width="14" height="66" rx="3.5"
        fill="white" opacity="0.90"/>

  <!-- Thin accent spine (adds richness) -->
  <rect x="95" y="42" width="8"  height="50" rx="2"
        fill="white" opacity="0.38"/>

  <!-- Shelf base line -->
  <rect x="14" y="96" width="92" height="3.5" rx="1.75"
        fill="white" opacity="0.22"/>

</svg>
